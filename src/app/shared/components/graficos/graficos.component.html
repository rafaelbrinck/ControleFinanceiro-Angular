<div class="bi-dashboard">

  <div class="row g-2 mb-4">
    <div class="col-6">
      <div class="kpi-card-mini bg-white border rounded-4 p-3 shadow-sm h-100">
        <small class="text-muted d-block mb-1">Taxa de Conversão</small>
        <div class="d-flex align-items-center gap-2">
          <h4 class="fw-bold mb-0 text-dark">{{ taxaConversao | number:'1.1-1' }}%</h4>
          <i class="bi bi-funnel text-primary"></i>
        </div>
        <div class="progress mt-2" style="height: 4px;">
          <div class="progress-bar bg-primary" [style.width.%]="taxaConversao"></div>
        </div>
      </div>
    </div>
    <div class="col-6">
      <div class="kpi-card-mini bg-white border rounded-4 p-3 shadow-sm h-100">
        <small class="text-muted d-block mb-1">Ticket Médio</small>
        <h4 class="fw-bold mb-0 text-dark">{{ ticketMedio | currency:'BRL':'symbol':'1.0-0' }}</h4>
        <small class="text-success" style="font-size: 10px;">Valor p/ venda</small>
      </div>
    </div>
  </div>

  <div class="row g-2 mb-4">
    <div class="col-12" *ngIf="orcamentosVencidos > 0">
      <div class="card border-0 bg-danger bg-opacity-10 rounded-4 p-3 d-flex flex-row align-items-center justify-content-between" [routerLink]="['/lista-orcamentos']" style="cursor: pointer;">
        <div class="d-flex align-items-center gap-3">
          <div class="icon-circle bg-danger text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
            <i class="bi bi-alarm-fill"></i>
          </div>
          <div>
            <h6 class="mb-0 fw-bold text-danger">Inadimplência</h6>
            <small class="text-danger opacity-75">{{ orcamentosVencidos }} boletos vencidos agora</small>
          </div>
        </div>
        <i class="bi bi-chevron-right text-danger"></i>
      </div>
    </div>
  </div>

  <h6 class="fw-bold text-uppercase text-muted small mb-3 tracking-wide px-1 mt-4">Inteligência de Dados</h6>
  
  <div class="row g-3">
    
    <div class="col-md-4">
      <div class="card border-0 shadow-sm rounded-4 p-3 h-100 bg-white">
        <h6 class="fw-bold text-dark mb-3 small text-uppercase tracking-wider">
          <i class="bi bi-pie-chart-fill text-danger me-1"></i> Onde Gasta? (Despesas)
        </h6>
        <div style="height: 220px;">
          <canvas baseChart [data]="chartCategoriasData" [options]="pieOptions" chartType="doughnut"></canvas>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card border-0 shadow-sm rounded-4 p-3 h-100 bg-white">
        <h6 class="fw-bold text-dark mb-3 small text-uppercase tracking-wider">
          <i class="bi bi-person-lines-fill text-primary me-1"></i> Top Clientes (Pedidos)
        </h6>
        <div style="height: 220px;">
          <canvas baseChart [data]="chartClientesQtdData" [options]="pieOptions" chartType="pie"></canvas>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card border-0 shadow-sm rounded-4 p-3 h-100 bg-white">
        <h6 class="fw-bold text-dark mb-3 small text-uppercase tracking-wider">
          <i class="bi bi-award-fill text-success me-1"></i> Top Clientes (Receita)
        </h6>
        <div style="height: 220px;">
          <canvas baseChart [data]="chartClientesValorData" [options]="chartOptions" chartType="bar"></canvas>
        </div>
      </div>
    </div>

  </div>

</div>
