<div class="container my-4 max-w-700 pb-5">
  
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
    <div class="bg-primary p-4 text-center text-white position-relative overflow-hidden">
      <div class="position-relative z-1">
        <h3 class="fw-bolder mb-1">{{ produto.id ? 'Editar Produto' : 'Novo Produto' }}</h3>
        <p class="mb-0 opacity-75 small fw-medium">Preencha as informações do item</p>
      </div>
      <div class="circle-deco"></div>
    </div>

    <div class="card-body p-4 p-md-5">
      <form>
        
        <h6 class="text-primary fw-bolder text-uppercase small mb-3 tracking-wide">Informações Gerais</h6>
        
        <div class="row g-4 mb-5">
          <div class="col-12">
            <div class="form-floating">
              <input type="text" class="form-control rounded-4" id="nomeProduto" [(ngModel)]="produto.nome" name="nome" placeholder="Ex: Camiseta Básica">
              <label for="nomeProduto">Nome do Produto</label>
            </div>
          </div>

          <div class="col-md-8 col-12">
            <div class="form-floating">
              <div class="dropdown w-100 h-100">
                <button class="form-control rounded-4 h-100 d-flex align-items-center justify-content-between border-0 custom-select-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="padding-top: 1.625rem; padding-bottom: 0.625rem;">
                  <span class="text-truncate" [ngClass]="produto.categoria ? 'text-dark fw-bold' : 'text-muted fw-normal'">
                    <i class="bi bi-box-seam me-2" [ngClass]="produto.categoria ? 'text-primary' : ''"></i>
                    {{ getNomeCategoria() || 'Selecione...' }}
                  </span>
                </button>
                <label class="position-absolute top-0 start-0 w-100 px-3 py-2 text-muted small fw-bold">Categoria</label>
                
                <ul class="dropdown-menu w-100 border-0 shadow-lg rounded-4 p-2 mt-2 custom-dropdown-menu">
                  <li *ngFor="let cat of categoriasAgrupadas">
                    <a class="dropdown-item rounded-3 py-2 px-3 d-flex align-items-center gap-2"
                       [ngClass]="{'ms-3': cat.isFilha, 'active-item': produto.categoria === cat.id}" (click)="selecionarCategoria(cat.id)">
                      <i class="bi text-muted" [ngClass]="cat.isFilha ? 'bi-arrow-return-right' : 'bi-folder2-open'"></i>
                      <span [class.fw-medium]="!cat.isFilha">{{ cat.nome }}</span>
                    </a>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <div class="col-md-4 col-12">
            <div class="form-floating">
              <input type="number" class="form-control rounded-4" id="qtdGancho" [(ngModel)]="produto.qtd_gancho" name="qtd_gancho" placeholder="1">
              <label for="qtdGancho">Ganchos (Qtd)</label>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="text-primary fw-bolder text-uppercase small mb-0 tracking-wide">Precificação</h6>
          <div class="form-check form-switch fs-5">
            <input class="form-check-input shadow-none" type="checkbox" role="switch" id="variacaoSwitch" [checked]="mostrarVariacao || produto.variacoes.length > 0" (change)="mostrarVariacao ? fecharVariacoes() : adicionarVariacao()">
            <label class="form-check-label small fw-bold text-muted fs-6 mt-1 ms-1" for="variacaoSwitch">Tem variações?</label>
          </div>
        </div>

        <div class="form-floating mb-4 fade-in" *ngIf="!mostrarVariacao && produto.variacoes.length === 0">
          <input type="text" class="form-control rounded-4 fs-4 fw-bold text-success py-3 h-auto" id="valorUnico" [value]="valorFormatado" (input)="mascaraValor($event)" placeholder="0,00" name="valorUnico">
          <label for="valorUnico">Preço Final (R$)</label>
        </div>

        <div class="bg-light rounded-4 p-4 mb-4 border-0 fade-in" *ngIf="mostrarVariacao || produto.variacoes.length > 0">
          
          <div class="mb-4" *ngIf="produto.variacoes.length > 0">
            <div *ngFor="let v of produto.variacoes" class="d-flex align-items-center gap-3 mb-2 bg-white p-3 rounded-4 shadow-sm">
              <div class="flex-grow-1">
                <small class="d-block text-muted fw-bold" style="font-size: 0.65rem; letter-spacing: 0.5px;">VARIAÇÃO</small>
                <span class="fw-bold text-dark">{{ v.variacao }}</span>
              </div>
              <div class="text-end px-3 border-start">
                <small class="d-block text-muted fw-bold" style="font-size: 0.65rem;">VALOR</small>
                <span class="fw-bolder text-success fs-6">{{ v.valor | moeda }}</span>
              </div>
              <button type="button" class="btn btn-light bg-danger-subtle text-danger rounded-circle p-2" (click)="removerVariacao(v)">
                <i class="bi bi-trash-fill"></i>
              </button>
            </div>
          </div>

          <div *ngIf="mostrarVariacao" class="bg-white p-3 rounded-4 shadow-sm border border-primary-subtle">
            <h6 class="small fw-bold text-primary mb-3">Nova Variação</h6>
            <div class="row g-2 align-items-center">
              <div class="col-12 col-md-5">
                <input type="text" class="form-control rounded-3 bg-light border-0" [(ngModel)]="variacao.variacao" name="nomeVar" placeholder="Ex: Tamanho G">
              </div>
              <div class="col-12 col-md-4">
                <input type="text" class="form-control rounded-3 bg-light border-0 fw-bold text-success" [value]="valorFormatado" (input)="mascaraValor($event)" name="valorVar" placeholder="R$ 0,00">
              </div>
              <div class="col-12 col-md-3 mt-3 mt-md-0">
                <button type="button" class="btn btn-primary w-100 rounded-3 fw-bold" (click)="adicionarVariacaoNaListaLocalSeHouverLogica()">
                  <i class="bi bi-plus-lg"></i> Inserir
                </button>
              </div>
            </div>
          </div>
          
          <button type="button" *ngIf="!mostrarVariacao && produto.variacoes.length > 0" class="btn btn-outline-primary rounded-pill w-100 mt-3 fw-bold border-2" (click)="adicionarVariacao()">
            <i class="bi bi-plus-circle me-1"></i> Adicionar outra variação
          </button>
        </div>

        <div class="row g-3 mt-4 pt-4 border-top">
          <div class="col-12 col-md-6 order-2 order-md-1">
            <button type="button" class="btn btn-light btn-lg w-100 fw-bold text-secondary rounded-pill py-3" (click)="voltar()">Cancelar</button>
          </div>
          <div class="col-12 col-md-6 order-1 order-md-2">
            <button type="button" class="btn btn-success btn-lg w-100 fw-bold shadow-sm rounded-pill py-3" (click)="salvar()">
              <i class="bi bi-check2-circle me-2 fs-5"></i> Salvar Produto
            </button>
          </div>
        </div>

      </form>
    </div>
  </div>
</div>
