<div class="container my-4 max-w-700 pb-5">
  
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
    
    <div class="bg-primary p-4 text-center text-white position-relative overflow-hidden">
      <div class="position-relative z-1">
        <h3 class="fw-bold mb-1">{{ transacao.id ? 'Editar Transação' : 'Nova Transação' }}</h3>
        <p class="mb-0 opacity-75 small">Registre suas movimentações financeiras</p>
      </div>
      <div class="circle-deco"></div>
    </div>

    <div class="card-body p-4 p-md-5">
      <form>
        
        <div class="mb-4">
          <label class="d-block text-secondary small fw-bold text-uppercase mb-2">Tipo de Operação</label>
          <div class="row g-3">
            <div class="col-6">
              <label class="type-selector w-100">
                <input type="radio" name="tipo" value="Entrada" [(ngModel)]="transacao.tipo" class="d-none">
                <div class="selector-card income">
                  <i class="bi bi-arrow-down-left-circle-fill fs-4 mb-1"></i>
                  <span>Entrada</span>
                </div>
              </label>
            </div>
            <div class="col-6">
              <label class="type-selector w-100">
                <input type="radio" name="tipo" value="Saida" [(ngModel)]="transacao.tipo" class="d-none">
                <div class="selector-card expense">
                  <i class="bi bi-arrow-up-right-circle-fill fs-4 mb-1"></i>
                  <span>Saída</span>
                </div>
              </label>
            </div>
          </div>
        </div>

        <div class="row g-3">
          
          <div class="col-12">
            <div class="form-floating">
              <input type="text" class="form-control rounded-3 fs-4 fw-bold" id="valor" inputmode="decimal"
                [value]="valorFormatado" (input)="mascaraValor($event)" placeholder="0,00"
                [ngClass]="{'text-success': transacao.tipo === 'Entrada', 'text-danger': transacao.tipo === 'Saida'}">
              <label for="valor">Valor (R$)</label>
            </div>
          </div>

          <div class="col-12">
            <div class="form-floating">
              <input type="text" class="form-control rounded-3" id="descricao" [(ngModel)]="transacao.nome" name="descricao" placeholder="Ex: Conta de Luz">
              <label for="descricao">Descrição</label>
            </div>
          </div>

          <div class="col-12 col-md-6">
            <div class="input-group">
              <div class="form-floating flex-grow-1">
                <input type="date" class="form-control rounded-start-3 rounded-end-0" id="data" [(ngModel)]="transacao.data" name="data">
                <label for="data">Data</label>
              </div>
              <button class="btn btn-outline-secondary px-3" type="button" (click)="transacao.data = getDataHoje()" title="Definir Hoje">Hoje</button>
            </div>
          </div>

          <div class="col-12 col-md-6">
            <div class="form-floating">
              <select class="form-select rounded-3" id="categoria" [(ngModel)]="transacao.categoria" (ngModelChange)="conferirCategoria($event)" name="categoria">
                <option [ngValue]="null" disabled selected>Selecione...</option>
                <option *ngFor="let categoria of listaCategorias" [ngValue]="categoria.id">{{categoria.nome}}</option>
                <option [ngValue]="'nova'" class="fw-bold text-primary">+ Nova Categoria</option>
              </select>
              <label for="categoria">Categoria</label>
            </div>
          </div>

          <ng-container *ngIf="transacao.tipo === 'Saida'">
            <div class="col-12 col-md-6 fade-in">
              <div class="form-floating">
                <select class="form-select rounded-3" id="fornecedor" [(ngModel)]="transacao.fornecedor_id" name="fornecedor">
                  <option [ngValue]="null">Nenhum / Não se aplica</option>
                  <option *ngFor="let forn of listaFornecedores" [ngValue]="forn.id">{{forn.nome}}</option>
                </select>
                <label for="fornecedor"><i class="bi bi-shop me-1 text-muted"></i> Fornecedor</label>
              </div>
            </div>

            <div class="col-12 col-md-6 fade-in">
              <div class="form-floating">
                <select class="form-select rounded-3" id="cartao" [(ngModel)]="transacao.cartao_id" name="cartao">
                  <option [ngValue]="null">Nenhum (Dinheiro / Pix)</option>
                  <option *ngFor="let cartao of listaCartoes" [ngValue]="cartao.id">{{cartao.nome}}</option>
                </select>
                <label for="cartao"><i class="bi bi-credit-card me-1 text-muted"></i> Cartão de Crédito</label>
              </div>
            </div>
          </ng-container>

        </div>

        <div class="row g-2 mt-5 pt-2 border-top">
          <div class="col-6">
            <button type="button" class="btn btn-light btn-lg w-100 fw-medium text-secondary" (click)="voltar()">Voltar</button>
          </div>
          <div class="col-6">
            <button type="submit" class="btn btn-success btn-lg w-100 fw-bold shadow-sm" (click)="salvar()">
              <i class="bi bi-check-lg me-1"></i> {{ botao }}
            </button>
          </div>
        </div>

      </form>
    </div>
  </div>
</div>
