<header *ngIf="validaNavBar && estaLogado" class="navbar bg-white shadow-sm fixed-top app-header">
  <div class="container-fluid px-3 px-md-4">
    
    <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2 m-0" routerLink="/inicio">
      <img src="icons/icon.png" alt="Logo Controle Financeiro" width="32" height="32" class="rounded">
      <span class="d-sm-inline">{{ title }}</span>
    </a>

    <ul class="navbar-nav flex-row me-auto ms-5 d-none d-lg-flex gap-4">
      <li class="nav-item">
        <a class="nav-link-desktop" routerLink="/inicio" routerLinkActive="active-desktop"><i class="bi bi-house-door me-1"></i> Início</a>
      </li>
      <li class="nav-item">
        <a class="nav-link-desktop" routerLink="/transacoes" routerLinkActive="active-desktop"><i class="bi bi-currency-exchange me-1"></i> Transações</a>
      </li>
      <li class="nav-item">
        <a class="nav-link-desktop" routerLink="/cartoes" routerLinkActive="active-desktop"><i class="bi bi-credit-card me-1"></i> Cartões</a>
      </li>
      <li class="nav-item">
        <a class="nav-link-desktop" routerLink="/produtos" routerLinkActive="active-desktop"><i class="bi bi-box me-1"></i> Produtos</a>
      </li>
      <li class="nav-item">
        <a class="nav-link-desktop" routerLink="/clientes" routerLinkActive="active-desktop"><i class="bi bi-people me-1"></i> Clientes</a>
      </li>
      <li class="nav-item">
        <a class="nav-link-desktop" routerLink="/orcamento" routerLinkActive="active-desktop"><i class="bi bi-calculator me-1"></i> Orçamento</a>
      </li>
    </ul>

    <div class="d-flex align-items-center gap-3 ms-auto">
      <a class="text-decoration-none d-flex align-items-center" routerLink="/perfil" aria-label="Perfil">
        <img *ngIf="usuario?.logo" [src]="usuario?.logo" alt="Foto de Perfil" class="rounded-circle border" width="38" height="38" style="object-fit: cover;" />
        <i *ngIf="!usuario?.logo" class="bi bi-person-circle fs-2 text-secondary"></i>
      </a>
      
      <button class="btn btn-light text-danger rounded-circle p-2 d-flex align-items-center justify-content-center border-0 bg-danger-subtle" (click)="logout()" title="Sair" style="width: 38px; height: 38px;">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>
</header>

<nav *ngIf="validaNavBar && estaLogado" class="bottom-nav d-lg-none bg-white border-top shadow-lg fixed-bottom">
  <div class="d-flex justify-content-around align-items-center h-100 pb-safe">
    
    <a class="nav-item-mobile" routerLink="/inicio" routerLinkActive="active">
      <i class="bi bi-house-door"></i>
      <span>Início</span>
    </a>
    
    <a class="nav-item-mobile" routerLink="/transacoes" routerLinkActive="active">
      <i class="bi bi-currency-exchange"></i>
      <span>Transações</span>
    </a>
    
    <a class="nav-item-mobile" routerLink="/orcamento" routerLinkActive="active">
      <i class="bi bi-calculator"></i>
      <span>Orçamento</span>
    </a>
    
    <a class="nav-item-mobile" routerLink="/clientes" routerLinkActive="active">
      <i class="bi bi-people"></i>
      <span>Clientes</span>
    </a>

    <a class="nav-item-mobile text-secondary" data-bs-toggle="offcanvas" data-bs-target="#menuMaisMobile" role="button" style="cursor: pointer;">
      <i class="bi bi-list"></i>
      <span>Mais</span>
    </a>

  </div>
</nav>

<div class="offcanvas offcanvas-bottom rounded-top-4 border-0 shadow" tabindex="-1" id="menuMaisMobile" style="height: auto; max-height: 85vh;">
  <div class="offcanvas-header border-bottom px-4">
    <h6 class="offcanvas-title fw-bold text-dark">Menu Principal</h6>
    <button type="button" class="btn-close bg-light rounded-circle p-2" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  
  <div class="offcanvas-body p-0">
    <div class="list-group list-group-flush">
      
      <a class="list-group-item list-group-item-action py-3 px-4 d-flex align-items-center gap-3 border-0" routerLink="/produtos" data-bs-dismiss="offcanvas">
        <div class="bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 42px; height: 42px;">
          <i class="bi bi-box fs-5"></i>
        </div>
        <span class="fw-bold text-dark">Produtos</span>
        <i class="bi bi-chevron-right ms-auto text-muted small"></i>
      </a>

      <a class="list-group-item list-group-item-action py-3 px-4 d-flex align-items-center gap-3 border-0" routerLink="/clientes" data-bs-dismiss="offcanvas">
        <div class="bg-success-subtle text-success rounded-circle d-flex align-items-center justify-content-center" style="width: 42px; height: 42px;">
          <i class="bi bi-credit-card fs-5"></i>
        </div>
        <span class="fw-bold text-dark">Cartões</span>
        <i class="bi bi-chevron-right ms-auto text-muted small"></i>
      </a>

      <hr class="my-1 mx-4 text-muted opacity-25">

      <a class="list-group-item list-group-item-action py-3 px-4 d-flex align-items-center gap-3 border-0" routerLink="/perfil" data-bs-dismiss="offcanvas">
        <div class="bg-info-subtle text-info rounded-circle d-flex align-items-center justify-content-center" style="width: 42px; height: 42px;">
          <i class="bi bi-person-circle fs-5"></i>
        </div>
        <span class="fw-bold text-dark">Meu Perfil</span>
        <i class="bi bi-chevron-right ms-auto text-muted small"></i>
      </a>

      <a class="list-group-item list-group-item-action py-3 px-4 d-flex align-items-center gap-3 border-0" (click)="logout()" data-bs-dismiss="offcanvas" style="cursor: pointer;">
        <div class="bg-danger-subtle text-danger rounded-circle d-flex align-items-center justify-content-center" style="width: 42px; height: 42px;">
          <i class="bi bi-box-arrow-right fs-5"></i>
        </div>
        <span class="fw-bold text-danger">Sair do Sistema</span>
      </a>

    </div>
  </div>
</div>

<main class="main-content" [ngClass]="{'is-logged-in': validaNavBar && estaLogado}">
  <app-alerta #alertaGlobal></app-alerta>
  <router-outlet></router-outlet>
</main>
