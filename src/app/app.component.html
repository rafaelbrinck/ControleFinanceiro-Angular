<header *ngIf="validaNavBar && estaLogado" class="navbar bg-white shadow-sm fixed-top app-header">
  <div class="container-fluid px-3 px-md-4">
    
    <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2 m-0" routerLink="/inicio">
      <img src="icons/icon.png" alt="Logo Controle Financeiro" width="32" height="32" class="rounded">
      <span class="d-sm-inline">{{ title }}</span>
    </a>

    <ul class="navbar-nav flex-row me-auto ms-5 d-none d-lg-flex gap-4">
      <li class="nav-item">
        <a class="nav-link-desktop" routerLink="/inicio" routerLinkActive="active-desktop"><i class="bi bi-house-door me-1"></i> Início</a>
      </li>
      <li class="nav-item">
        <a class="nav-link-desktop" routerLink="/transacoes" routerLinkActive="active-desktop"><i class="bi bi-currency-exchange me-1"></i> Transações</a>
      </li>
      <li class="nav-item">
        <a class="nav-link-desktop" routerLink="/produtos" routerLinkActive="active-desktop"><i class="bi bi-box me-1"></i> Produtos</a>
      </li>
      <li class="nav-item">
        <a class="nav-link-desktop" routerLink="/clientes" routerLinkActive="active-desktop"><i class="bi bi-people me-1"></i> Clientes</a>
      </li>
      <li class="nav-item">
        <a class="nav-link-desktop" routerLink="/orcamento" routerLinkActive="active-desktop"><i class="bi bi-calculator me-1"></i> Orçamento</a>
      </li>
    </ul>

    <div class="d-flex align-items-center gap-3 ms-auto">
      <a class="text-decoration-none d-flex align-items-center" routerLink="/perfil" aria-label="Perfil">
        <img *ngIf="usuario?.logo" [src]="usuario?.logo" alt="Foto de Perfil" class="rounded-circle border" width="38" height="38" style="object-fit: cover;" />
        <i *ngIf="!usuario?.logo" class="bi bi-person-circle fs-2 text-secondary"></i>
      </a>
      
      <button class="btn btn-light text-danger rounded-circle p-2 d-flex align-items-center justify-content-center border-0 bg-danger-subtle" (click)="logout()" title="Sair" style="width: 38px; height: 38px;">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>
</header>

<nav *ngIf="validaNavBar && estaLogado" class="bottom-nav d-lg-none bg-white border-top shadow-lg fixed-bottom">
  <div class="d-flex justify-content-around align-items-center h-100 pb-safe">
    
    <a class="nav-item-mobile" routerLink="/inicio" routerLinkActive="active">
      <i class="bi bi-house-door"></i>
      <span>Início</span>
    </a>
    
    <a class="nav-item-mobile" routerLink="/transacoes" routerLinkActive="active">
      <i class="bi bi-currency-exchange"></i>
      <span>Transações</span>
    </a>
    
    <a class="nav-item-mobile" routerLink="/produtos" routerLinkActive="active">
      <i class="bi bi-box"></i>
      <span>Produtos</span>
    </a>
    
    <a class="nav-item-mobile" routerLink="/clientes" routerLinkActive="active">
      <i class="bi bi-people"></i>
      <span>Clientes</span>
    </a>
    
    <a class="nav-item-mobile" routerLink="/orcamento" routerLinkActive="active">
      <i class="bi bi-calculator"></i>
      <span>Orçamento</span>
    </a>

  </div>
</nav>

<main class="main-content" [ngClass]="{'is-logged-in': validaNavBar && estaLogado}">
  <app-alerta #alertaGlobal></app-alerta>
  <router-outlet></router-outlet>
</main>
